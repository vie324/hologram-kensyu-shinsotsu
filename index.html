// ── GAS連携設定 ──
// ※ デプロイ後のGAS WebアプリURLをここに貼り付けてください
const GAS_URL = "https://script.google.com/macros/s/AKfycbw62UCn1x1GYw8OavGGvod17NPvqexOj4hx6mPDRNZ51Y1cu0K0uX9L1nlJAJB7bUh8Pg/exec";

const sendToGAS = async (payload) => {
  if (!GAS_URL) return null;
  try {
    const res = await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify(payload),
      redirect: "follow",
    });
    const text = await res.text();
    try { return JSON.parse(text); } catch { console.warn("GAS応答パースエラー:", text); return { error: "GASからの応答を解析できません。GASを再デプロイしてください。" }; }
  } catch (e) {
    console.warn("GAS送信エラー:", e);
    return { error: "GASへの接続に失敗しました: " + e.message };
  }
};

const fetchFromGAS = async (params = {}) => {
  if (!GAS_URL) return null;
  try {
    const url = new URL(GAS_URL);
    Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
    const res = await fetch(url.toString(), { redirect: "follow" });
    const text = await res.text();
    try { return JSON.parse(text); } catch { console.warn("GAS応答パースエラー:", text); return null; }
  } catch (e) {
    console.warn("GAS取得エラー:", e);
    return null;
  }
};

// ── ANIMATION WRAPPER ──
const FadeIn = ({ children, delay = 0, className = "" }) => {
  const [visible, setVisible] = useState(false);
  useEffect(() => { const t = setTimeout(() => setVisible(true), delay); return () => clearTimeout(t); }, [delay]);
  return (
    <div className={className} style={{
      opacity: visible ? 1 : 0,
      transform: visible ? "translateY(0)" : "translateY(16px)",
      transition: `opacity 0.6s cubic-bezier(0.16,1,0.3,1) ${delay}ms, transform 0.6s cubic-bezier(0.16,1,0.3,1) ${delay}ms`,
    }}>{children}</div>
  );
};

// ── TRAINING DATA (abbreviated keys, full content preserved) ──
const TRAINING_DATA={days:[{id:"day1",title:"社会人マインドセット & 接客の土台",subtitle:"プロの心構え・第一印象・敬語の基本",description:"プロフェッショナルとしての心構えと、接客に必要な基礎スキルを学びます。",modules:[{id:"m1",title:"社会人としての心構え",lessons:[{id:"m1l1",title:"プロフェッショナルとは何か",content:`## プロフェッショナルの定義\n\n美容業界における「プロフェッショナル」とは、単に技術が優れているだけではありません。**お客様の期待を超える体験を提供し続ける人**のことです。\n\n### 3つの柱\n\n**① 技術力** — 確かな施術スキル\n技術は大前提です。しかし、技術だけでリピーターは生まれません。ある調査では、美容サロンを変える理由の1位は「技術不満」ではなく「接客態度」だったというデータがあります。\n\n**② 人間力** — 信頼される人柄\nお客様は「この人にまた会いたい」と思う人のもとに戻ってきます。清潔感、気配り、誠実さ — これらは技術と同等以上の価値があります。\n\n人間力の具体例：\n- お客様の名前を覚えている\n- 前回の会話を覚えている\n- 小さな変化に気づく\n- 困っている人を見たら声をかける\n- 約束を守る、嘘をつかない\n\n**③ 仕事力** — 安定したパフォーマンス\n毎日同じクオリティを出し続ける力。体調管理、感情のコントロール、準備の徹底。「今日はちょっと調子悪くて…」はプロの言葉ではありません。\n\n### HOLOGRAMが求めるスタッフ像\n\nHOLOGRAMでは、一人ひとりのスタッフが**プロフェッショナルとしての自覚**を持って働いています。契約形態にかかわらず、**自分の成長に責任を持ち、主体的にキャリアを築いていく**姿勢が大切です。\n\n| 項目 | アマチュア | プロフェッショナル |\n|---|---|---|\n| 技術 | できるときもある | いつでもできる |\n| 気分 | 日によって変わる | 常に安定 |\n| ミス | 言い訳する | 改善策を出す |\n| 学び | 言われたらやる | 自分から求める |\n| 責任 | 他人のせいにする | 自分ごととして捉える |\n\n### 学びのポイント\n- 技術力だけでなく、人間力と仕事力の3つが揃って初めてプロフェッショナル\n- プロとしての自覚を持ち、主体的にキャリアを築く\n- お客様のリピートは技術以上に「人」で決まる`},{id:"m1l2",title:"時間管理と自己管理",content:`## 時間は最大の信頼指標\n\n### なぜ時間管理が重要か\n\n美容サロンでは、1分の遅れが連鎖的な問題を引き起こします。\n\n**遅刻の連鎖反応シミュレーション：**\n- 10:00 あなたが5分遅刻\n- 10:05 準備が5分遅れ、10:10開始の施術が10:15開始に\n- 11:25 施術終了が5分押す\n- 11:30 次のお客様を5分お待たせする\n→ 結果：1人の5分が、その日の店舗全体のスケジュールに波及\n\n### 出勤と準備の考え方\n\n**余裕を持った準備がプロの第一歩です。**\n\n準備の流れ（例）：\n- 着替え・手洗い・身だしなみチェック\n- 器具の準備・施術台の確認\n- 本日の予約確認・前回のカルテ確認\n\n\n### 体調管理もプロの仕事\n\n**報告のテンプレート（Lark）：**\n「お疲れ様です。体調不良のためお休みをいただきたくご連絡いたします。\n本日の予約：〇〇時に△△様、□□時に◇◇様の計2件\nご迷惑をおかけして申し訳ございません。ご指示をお願いいたします。」\n\n**絶対にNG：**\n- 始業時間を過ぎてからの連絡\n- 連絡なしの欠勤（無断欠勤は信頼関係を大きく損ないます）\n- 休養に専念し、早期復帰を心がける\n\n### 感情の自己管理\n\n**感情リセットの具体的な方法：**\n- 出勤前に深呼吸3回\n- 鏡で笑顔を確認してから店舗に入る\n- ネガティブな話題をスタッフルームに持ち込まない\n- どうしても辛い時は管理者に相談する\n\n### 学びのポイント\n- 余裕を持って出勤し、準備を整える習慣をつける\n- 体調不良の連絡は早さが命\n- 感情を自分でコントロールするのもプロの仕事`},{id:"m1l3",title:"責任感と当事者意識",content:`## 「自分ごと」として捉える力\n\n### 当事者意識とは\n\n「それは私の担当じゃないので」— この一言でお客様の信頼は一瞬で崩れます。当事者意識とは、**目の前で起きていることすべてを「自分に関係がある」と捉える姿勢**です。\n\n### 具体的な場面\n\n**場面1: 電話が鳴っている**\n- ✕ 「フロント担当じゃないから」と無視する\n- ○ 手が空いていれば自分が出る\n\n**場面2: 店内にゴミが落ちている**\n- ✕ 「掃除の時間にやればいい」と通り過ぎる\n- ○ 気づいたらすぐ拾う\n\n**場面3: 他のスタッフのお客様が困っている**\n- ✕ 「あの人のお客様だから」と知らんぷり\n- ○ 「何かお手伝いできることはありますか？」と声をかける\n\n### 「言い訳」vs「改善策」\n\n| 言い訳（NG） | 改善策（OK） |\n|---|---|\n| 「忙しかったので…」 | 「次回からチェックリストを使います」 |\n| 「聞いてなかったです」 | 「メモを取る習慣をつけます」 |\n| 「前の人がやってなかったので」 | 「自分が気づいた時点で対応します」 |\n| 「教えてもらってません」 | 「わからないことは自分から聞くようにします」 |\n\n### 言い訳をしたくなった時の切り替え方\n\n1. まず深呼吸する\n2. 「承知しました」と受け止める\n3. 「どうすれば次は防げるか？」を考える\n4. 「次回から〇〇するようにします」と伝える\n\n### 学びのポイント\n- 「自分の仕事じゃない」と思った瞬間が成長のチャンス\n- 言い訳の代わりに改善策を出す\n- 信頼は毎日の小さな行動で積み上がり、一瞬で崩れる`},{id:"m1l4",title:"美容業界で働く覚悟",content:`## サービス業の本質を理解する\n\n### 美容業は「人の美しさに寄り添う仕事」\n\nお客様がサロンに来る理由は様々です。\n\n- 自分をもっと好きになりたい\n- 大切なイベントの前に綺麗になりたい\n- 日常のストレスを忘れて癒されたい\n- 定期的なメンテナンスとして\n\n共通しているのは、**お客様は「変わりたい」「維持したい」という気持ちを持って来店されている**ということ。\n\n### 体力面の覚悟\n\n- 1回の施術で60〜120分、同じ姿勢で集中\n- 1日に3〜5件の施術\n- 目を酷使するため、視力管理・眼精疲労対策が重要\n- 指先の繊細な作業が続くため、手指のストレッチを習慣に\n- 前傾姿勢が続くため、肩こり・腰痛の予防ケアも大切\n- 土日祝日は来客が多い傾向があります（シフトは契約・相談に基づきます）\n\n### 休息も大切な仕事の一部\n\n質の高い施術を提供し続けるためには、適切な休憩・休暇が不可欠です。体調に不安がある場合は無理をせず、早めに相談しましょう。労働条件や休暇については、契約内容を確認し、不明点は管理者に相談してください。\n\n### メンタル面の覚悟\n\n- お客様から厳しい言葉をいただくこともある\n- 思い通りの仕上がりにならず悔しい思いをすることもある\n- 売上が伸び悩む時期もある\n\nこれらは**成長の過程で必ず経験すること**です。\n\n### 1年後・3年後・5年後のキャリアイメージ\n\n**1年後：** 基本的な施術を自信を持ってこなせる。リピーターが増え始める\n**3年後：** 指名客がつき、安定した売上。後輩の指導もできる\n**5年後：** 店舗のエース級。独立や店長への道も見えてくる\n\n### 学びのポイント\n- お客様の「変わりたい」気持ちに寄り添う仕事\n- 体力管理は仕事の一部\n- 辛い時期を乗り越えた先に成長がある\n- 学びを止めない姿勢がプロの条件`}],quiz:[{q:"HOLOGRAMが最も重視するスタッフの資質は？",opts:["技術力のみ","人間力のみ","技術力・人間力・仕事力の3つ","売上実績のみ"],ans:2,explanation:"技術力・人間力・仕事力の3つが揃って初めてプロフェッショナルです。"},{q:"出勤時に大切な心構えは？",opts:["ギリギリに到着する","余裕を持って出勤し準備を整える","準備は始業後にする","他の人に任せる"],ans:1,explanation:"余裕を持って出勤し、落ち着いて準備を整えることが大切です。"},{q:"体調不良で休む場合の正しい対応順序は？",opts:["当日朝に電話→詳細は後で","Larkで早めに連絡→予約状況報告→代替案提案","始業時間に連絡→理由説明","同僚に伝言"],ans:1,explanation:"Larkで早めに連絡し、予約状況と影響範囲を報告します。"},{q:"プロフェッショナルの3つの柱に含まれないものは？",opts:["技術力","人間力","仕事力","営業力"],ans:3,explanation:"3つの柱は「技術力」「人間力」「仕事力」です。"},{q:"体調不良時の連絡で最も大切なことは？",opts:["詳しい病状の説明","できるだけ早く連絡すること","復帰日の確約","診断書の提出"],ans:1,explanation:"早めの連絡が最も大切です。予約への影響を最小限にするためにも迅速に報告しましょう。"}],writtenExercises:[{q:"あなたが考える「プロフェッショナル」とはどのような人ですか？過去に出会ったプロフェッショナルな人の具体的なエピソードを1つ挙げ、その人のどこがプロフェッショナルだと感じたか、200字以上で記述してください。",hint:"技術力・人間力・仕事力の3つの柱に触れながら書くと良いでしょう。"},{q:"プロフェッショナルとして働くことは「個人事業主」であることを意味します。正社員と比べて日々の仕事への向き合い方はどう変わるべきですか？具体的な行動レベルで3つ以上挙げてください。",hint:"報酬、責任、自己管理、学習、ブランディングなどの観点から考えましょう。"},{q:"「気分が乗らないけど予約がある朝」を想像してください。出勤してからお客様を迎えるまでに気持ちを切り替える具体的な行動を時系列で書いてください。",hint:"自分なりの感情リセット方法を「習慣」にできるか考えてみましょう。"}]},{id:"m2",title:"第一印象と身だしなみ",lessons:[{id:"m2l1",title:"第一印象の科学",content:`## 人は見た目で9割判断する\n\n### メラビアンの法則\n\n- **視覚情報（見た目・表情・しぐさ）：55%**\n- **聴覚情報（声のトーン・速度）：38%**\n- **言語情報（話の内容）：7%**\n\n**来店後の最初の7秒**で、お客様の「このサロンは信頼できるか」の判断がほぼ決まります。\n\n### 初頭効果とハロー効果\n\n**初頭効果：** 最初に受けた印象をなかなか変えられない\n**ハロー効果：** 1つの目立つ特徴が、他の全ての評価に影響する\n\n- 笑顔が素敵 → 「きっと技術も丁寧だろう」\n- 服がシワだらけ → 「施術も雑なんじゃないか」\n\n### アイラッシュ施術特有の距離感\n\n- まつ毛エクステ：顔から**15〜25cm**（息がかかる距離）\n- 施術時間：60〜120分、お客様は目を閉じた状態\n\nこの距離は心理学でいう「密接距離（intimate distance：0〜45cm）」に該当し、通常は恋人や家族しか入らないパーソナルスペースです。だからこそ：\n\n**特に注意すべきポイント：**\n- **口臭対策**：施術前の歯磨き・マウスウォッシュは必須\n- **鼻呼吸**：口呼吸はお客様の顔に直接息がかかる\n- **体臭対策**：制汗剤の使用、施術着のこまめな洗濯\n- **手元の清潔**：施術直前の手洗い・消毒は徹底\n- **声のボリューム**：耳元で話すため、囁くような穏やかなトーンで\n\nお客様は目を閉じているため、**聴覚と嗅覚が鋭敏**になっています。普段は気にならない小さな音や匂いも強く感じます。\n\n### 学びのポイント\n- 第一印象の93%は非言語情報で決まる\n- 最初の7秒で信頼の土台が決まる\n- ハロー効果：1つの良い印象が全体の評価を引き上げる`},{id:"m2l2",title:"身だしなみの基準",content:`## HOLOGRAMスタッフの身だしなみ\n\n### 「おしゃれ」と「身だしなみ」の違い\n\n| | おしゃれ | 身だしなみ |\n|---|---|---|\n| 基準 | 自分の好み | 相手からの見え方 |\n| 目的 | 自己表現 | 信頼感の構築 |\n| 判断 | 自分がどう思うか | お客様がどう感じるか |\n\n### チェック項目\n\n**髪：** 清潔で整っている / 施術に支障のない長さ・まとめ方\n**顔：** ナチュラルで清潔感のあるメイク / エクステスタッフは自身もエクステを\n**手元：** 爪は清潔で適切な長さ / 手荒れのケア / アクセサリーは最小限\n**目元：** アイラッシュスタッフとして自身のまつ毛も整える / 目元のメイクは「施術例」としてお客様に見られる意識を\n**服装：** シワ・汚れなし / 露出控えめ / 動きやすい\n**匂い：** 体臭対策 / 口臭対策 / 香水は基本NG / 柔軟剤も注意\n\n### 出勤前の5点チェック\n\n1. **全身** — シワ・汚れ・ほつれ\n2. **髪** — 寝ぐせ・乱れ\n3. **顔** — メイク・清潔感\n4. **手元** — 爪・手荒れ・アクセサリー\n5. **匂い** — 歯磨き・制汗\n\n### 学びのポイント\n- おしゃれ ≠ 身だしなみ。基準は「お客様がどう感じるか」\n- 手元・匂いは特に重要\n- 出勤前の5点チェックを毎日の儀式にする`},{id:"m2l3",title:"表情・姿勢・立ち居振る舞い",content:`## 無言でも伝わるメッセージ\n\n### 表情\n\n**自然な笑顔のポイント：**\n- 口角を上げるだけでなく目元も柔らかく\n- 「この方に会えて嬉しい」と心の中で思う\n- 施術中も穏やかな表情を保つ\n\n**NGな表情：** 無表情 / 眉間にシワ / 疲れた表情\n\n**アイラッシュ施術中の表情：**\nお客様は目を閉じていますが、施術開始前と仕上がり確認時にはお顔を見ます。また、隣のベッドのお客様からも見えています。施術中も穏やかな表情を保ちましょう。\n\n### 姿勢\n\n**立ち姿勢：** 背筋を伸ばす / 肩の力を抜く / 猫背NG\n**座り姿勢：** 背もたれに寄りかからない / 足を組まない\n\n### 動作のルール\n\n- 店内を走らない\n- ドアの開閉は静かに\n- 物を渡す時は両手で\n- 指差しではなく手のひらで方向を示す\n- お客様の前を横切る時は「前を失礼します」\n\n### 学びのポイント\n- 笑顔は「心」から。トレーニングで自然にできる\n- 姿勢は常に意識。猫背は信頼感を損なう\n- 全ての動作に「丁寧さ」を`}],quiz:[{q:"メラビアンの法則で印象形成に最も影響するのは？",opts:["話の内容","声のトーン","見た目・表情・しぐさ","すべて均等"],ans:2,explanation:"視覚情報が55%と最も大きな割合です。"},{q:"第一印象が決まるのは来店後およそ何秒？",opts:["3秒","7秒","30秒","1分"],ans:1,explanation:"最初の7秒で信頼の判断がほぼ決まります。"},{q:"「ハロー効果」とは？",opts:["最初の印象が持続","1つの特徴が他の全評価に影響","笑顔が好印象","清潔感が重要"],ans:1,explanation:"1つの特徴が他の評価に波及する現象です。"},{q:"香水を控えるべき主な理由は？",opts:["コスト","スタッフ配慮","お客様との距離が近い","ルール"],ans:2,explanation:"顔から20〜30cmの距離で施術します。"}],writtenExercises:[{q:"初めてのお店に入った時、最初の数秒間で何を見て「良さそう」「微妙」と判断していますか？自分の経験を振り返り、5つ以上のチェックポイントと理由を記述してください。",hint:"自分がお客様の立場で感じたことを掘り下げましょう。"},{q:"「出勤前の5点チェック」に照らして自分の身だしなみを自己評価してください。できていること、改善が必要なこと、明日から変えることを書いてください。",hint:"正直な自己評価が大切です。完璧でなくても改善点を認識できることが重要。"}]},{id:"m3",title:"敬語と言葉遣いの基本",lessons:[{id:"m3l1",title:"敬語の3分類と実践フレーズ",content:`## 敬語を正しく使い分ける\n\n### 3種類の敬語\n\n**① 尊敬語** — お客様の動作を高める\n**② 謙譲語** — 自分の動作をへりくだらせる\n**③ 丁寧語** — 文末を丁寧にする\n\n### よくある間違いと正しい表現\n\n| ✕ 間違い | ○ 正しい | 理由 |\n|---|---|---|\n| お名前を頂戴できますか | お名前をお伺いしてもよろしいですか | 名前は「もらう」ものではない |\n| 了解しました | 承知いたしました | 「了解」は目上に使わない |\n| なるほどですね | おっしゃる通りです | カジュアルすぎる |\n| ちょっと待ってください | 少々お待ちいただけますか | 「ちょっと」はカジュアル |\n| 〜になります | 〜でございます | 「なる」は変化の言葉 |\n\n### 敬語の練習方法\n\n毎朝声に出して読む5フレーズ：\n1. 「いらっしゃいませ。ご予約の〇〇様でいらっしゃいますか」\n2. 「承知いたしました。少々お待ちいただけますか」\n3. 「恐れ入りますが、お名前をお伺いしてもよろしいですか」\n4. 「本日のお会計は〇〇円でございます」\n5. 「ありがとうございました。またお待ちしております」\n\n### 学びのポイント\n- 「了解しました」ではなく「承知いたしました」\n- 二重敬語は逆に不自然\n- 音読トレーニングで体に染み込ませる`},{id:"m3l2",title:"NGワード・クッション言葉・電話対応",content:`## 使ってはいけない言葉 / 使うべき言葉\n\n### NGワード\n\n**曖昧系：** 「一応」「多分」「〜だと思います」\n**カジュアル系：** 「私的には」「マジですか」「ヤバい」「〜って感じ」\n**否定系：** 「できません」→「〜であれば可能です」/ 「わかりません」→「確認いたします」\n\n### クッション言葉\n\n**依頼時：** 恐れ入りますが / お手数おかけしますが\n**断る時：** あいにくですが / 申し訳ございませんが\n**確認時：** 差し支えなければ / もしよろしければ\n**提案時：** よろしければ〜はいかがでしょうか\n\n### 電話対応\n\n**取る時：** 「お電話ありがとうございます。HOLOGRAMでございます。」\n**保留：** 30秒以内。超えるなら折り返し\n**切る時：** お客様が切ってから\n\n### Larkコミュニケーション\n\n**報告の型：**\n「お疲れ様です。〇〇の件についてご報告です。\n【結論】〇〇が発生しました。\n【詳細】〇〇の状況です。\n【対応】ご指示をお願いいたします。」\n\n### 学びのポイント\n- 曖昧な言葉は不安を、カジュアルな言葉は不信感を与える\n- 否定文は代替案とセットで\n- クッション言葉は反射的に出るまで練習`},{id:"m3l3",title:"対お客様 — 場面別の敬語フレーズ集",content:`## サロンワークで使う敬語を場面ごとにマスターする\n\n### 来店時\n\n| 場面 | NG表現 | OK表現 |\n|---|---|---|\n| お出迎え | 「いらっしゃい」「どうぞ〜」 | 「いらっしゃいませ。ご予約の〇〇様でいらっしゃいますか」 |\n| 名前確認 | 「お名前は？」 | 「恐れ入りますが、お名前をお伺いしてもよろしいですか」 |\n| 荷物預かり | 「荷物預かります」 | 「お荷物をお預かりいたします」 |\n| 案内 | 「こっちです」 | 「こちらへどうぞ。お席にご案内いたします」 |\n| 待たせる | 「ちょっと待ってて」 | 「恐れ入りますが、少々お待ちいただけますか。〇分ほどでご案内いたします」 |\n\n### カウンセリング時\n\n| 場面 | NG表現 | OK表現 |\n|---|---|---|\n| 希望を聞く | 「どうしたいですか？」 | 「本日はどのような仕上がりをご希望ですか？」 |\n| 前回の確認 | 「前と同じ？」 | 「前回と同じ内容でよろしいでしょうか？」 |\n| アレルギー確認 | 「アレルギーある？」 | 「差し支えなければ、アレルギーの有無をお伺いしてもよろしいですか」 |\n| 提案する | 「これがいいと思う」 | 「〇〇様のお好みでしたら、こちらはいかがでしょうか」 |\n| 料金説明 | 「〇〇円になります」 | 「こちらのメニューは〇〇円でございます。よろしいでしょうか」 |\n\n### 施術中\n\n| 場面 | NG表現 | OK表現 |\n|---|---|---|\n| 体調確認 | 「大丈夫？」 | 「お加減はいかがですか？」 |\n| 姿勢変更 | 「ちょっと横向いて」 | 「恐れ入りますが、少しお顔を右にお向けいただけますか」 |\n| 温度確認 | 「暑くない？」 | 「室温は快適でいらっしゃいますか？」 |\n| 途中経過 | 「こんな感じ」 | 「途中経過でございます。ご確認いただけますか」 |\n| 離席する | 「ちょっと行ってくる」 | 「少々席を外させていただきます。すぐに戻ります」 |\n\n### 仕上げ・お会計・お見送り\n\n| 場面 | NG表現 | OK表現 |\n|---|---|---|\n| 仕上がり確認 | 「どう？」 | 「仕上がりはいかがでしょうか。気になる点はございますか」 |\n| ケア説明 | 「触らないでね」 | 「長持ちのために、施術後〇時間は触れないようお気をつけくださいませ」 |\n| 会計 | 「〇〇円ね」 | 「本日のお会計は〇〇円でございます」 |\n| 見送り | 「またね〜」 | 「ありがとうございました。またのお越しをお待ちしております」 |\n| 次回提案 | 「〇週間後来て」 | 「次回は〇週間後頃がおすすめでございます。ご都合いかがでしょうか」 |\n\n### お客様を不快にさせる「無意識フレーズ」\n\n以下は悪意なく使いがちだが、お客様によっては非常に気になるフレーズです。\n\n**① 「〜してあげる」系**\n- ✕ 「きれいにしてあげますね」\n- ○ 「きれいに仕上げてまいりますね」\n→ 「してあげる」は上から目線に聞こえる\n\n**② 「一応」「とりあえず」系**\n- ✕ 「一応こちらでやっておきますね」\n- ○ 「こちらで対応いたしますね」\n→ 手抜き感や不安感を与える\n\n**③ 語尾上げ・語尾伸ばし**\n- ✕ 「こちらでよろしいですかぁ？」「〇〇円になりまーす」\n- ○ 「こちらでよろしいでしょうか」「〇〇円でございます」\n→ 聞く人によっては「軽い」「バカにされている」と感じる\n\n**④ 「大丈夫ですか？」の多用**\n- ✕ 「大丈夫ですか？」を何度も繰り返す\n- ○ 場面に応じて「お加減はいかがですか」「ご不明点はございますか」「お痛みはございませんか」と使い分ける\n→ 同じ言葉の繰り返しは語彙力不足に見える\n\n### 学びのポイント\n- 場面ごとに定型フレーズを「型」として身につける\n- 「無意識フレーズ」は自分では気づきにくい — 録音やロールプレイで確認\n- 気になるお客様は必ずいる。全員に安心感を与えるレベルを目指す`},{id:"m3l4",title:"対スタッフ・対上司の敬語と言葉遣い",content:`## 社内でも言葉遣いは見られている\n\n### なぜ社内の言葉遣いが重要か\n\n**理由1：お客様に聞こえている**\nスタッフ同士の会話は、思っている以上にお客様の耳に届いています。バックルームの声、施術中の小声、Larkの通知音とともに漏れる会話 — すべてがサロンの印象を形成します。\n\n**理由2：チーム内の人間関係に直結**\n「言い方」ひとつで、信頼を築くことも壊すこともできます。業務委託の関係だからこそ、丁寧な言葉遣いが相互尊重の土台になります。\n\n**理由3：管理者の評価に影響**\n技術が同レベルなら、言葉遣いが丁寧な人にチャンスが回ります。\n\n### 対先輩スタッフの基本フレーズ\n\n| 場面 | NG表現 | OK表現 |\n|---|---|---|\n| 質問する | 「これどうやるの？」 | 「恐れ入りますが、〇〇の手順を教えていただけますか」 |\n| お礼 | 「ありがとう」 | 「ありがとうございます。大変勉強になります」 |\n| 確認する | 「これでいい？」 | 「こちらの方法で問題ないでしょうか」 |\n| 依頼する | 「これやっといて」 | 「お手数ですが、〇〇をお願いできますでしょうか」 |\n| 断る | 「無理です」 | 「申し訳ございません、〇〇の理由で対応が難しい状況です」 |\n\n### 対管理者（酒井・國田・平井）の基本フレーズ\n\n| 場面 | NG表現 | OK表現 |\n|---|---|---|\n| 報告 | 「〇〇でした」 | 「〇〇の件、ご報告いたします。結論から申し上げますと…」 |\n| 相談 | 「どうしたらいいですか」 | 「〇〇について相談させてください。私としてはAが良いと考えております」 |\n| ミス報告 | 「すいません、やっちゃいました」 | 「申し訳ございません。〇〇の件でミスがございました。現状は…」 |\n| 指示を受ける | 「はいはい」「わかった」 | 「承知いたしました。〇〇までに対応いたします」 |\n| フィードバック | 「でも…」「それは…」 | 「ご指摘ありがとうございます。次回から〇〇するよう改善いたします」 |\n\n### Lark（チャット）での言葉遣い\n\nLarkは文字が残るため、口頭以上に言葉遣いに注意が必要です。\n\n**基本ルール：**\n- 「お疲れ様です」から始める\n- 句読点をきちんと使う\n- 「！」の多用は避ける（1メッセージに1つまで）\n- スタンプだけの返信はNG（「承知いたしました」+ スタンプならOK）\n- 絵文字は管理者が使っている範囲に合わせる\n\n| 場面 | NG例 | OK例 |\n|---|---|---|\n| 了承 | 「り」「おけ」「りょ」 | 「承知いたしました」 |\n| 質問 | 「これってどういうこと？」 | 「〇〇の件、確認させてください。△△という理解で合っておりますでしょうか」 |\n| お願い | 「これお願い！」 | 「お手数ですが、〇〇をお願いできますでしょうか」 |\n| 遅刻連絡 | 「遅れます！」 | 「お疲れ様です。申し訳ございません。〇〇の影響で到着が△△時頃になる見込みです。ご迷惑をおかけいたします」 |\n\n### スタッフ間で避けるべき言い回し\n\n**① 命令口調**\n- ✕ 「〇〇やっといて」「早くして」\n- ○ 「〇〇お願いできますか」「お手すきの際にお願いします」\n\n**② 陰口・噂話の言葉遣い**\n- ✕ 「あの人マジ使えない」「〇〇さんってさ…」\n→ 不満は管理者へ正規ルートで報告。第三者への愚痴は絶対NG\n\n**③ 馴れ馴れしい崩し**\n- ✕ 入社1ヶ月で「〇〇ちゃん」「タメ口」\n→ 相手が許可しても、お客様の前では必ず丁寧語を保つ\n\n**④ 責任転嫁の言葉**\n- ✕ 「〇〇さんがそう言ったので」「聞いてません」\n- ○ 「私の確認不足でした。以後気をつけます」\n\n### 学びのポイント\n- 社内の言葉遣い = お客様への姿勢の表れ\n- Larkは文字が残る。一度送ったら消せない意識で\n- 「親しき仲にも礼儀あり」は業務委託関係では特に重要\n- 不満は愚痴ではなく、正規ルートで改善提案として伝える`},{id:"m3l5",title:"敬語の落とし穴と自己チェック",content:`## 「使えているつもり」が一番危ない\n\n### 二重敬語 — 丁寧すぎても不自然\n\n| ✕ 二重敬語 | ○ 正しい敬語 | 解説 |\n|---|---|---|\n| おっしゃられました | おっしゃいました | 「おっしゃる」+「られる」で二重 |\n| ご覧になられますか | ご覧になりますか | 「ご覧になる」+「られる」で二重 |\n| お越しになられました | お越しになりました / いらっしゃいました | 同上 |\n| お承りいたしました | 承りました | 「お」+「承る」+「いたす」で三重 |\n| お伺いさせていただきます | 伺います | 「お」+「伺う」+「させていただく」で三重 |\n\n### 「させていただく」の乱用\n\n「させていただく」は**相手の許可を得て行う場合**に使う表現です。\n\n- ✕ 「担当させていただいております田中です」→ ○ 「担当の田中でございます」\n- ✕ 「ご説明させていただきます」→ ○ 「ご説明いたします」\n- ○ 「お休みをいただいておりました」（許可を得て休んでいた → 適切）\n- ○ 「拝見させていただきます」（お客様の目元を見る許可 → 適切）\n\n**判断基準：** 「相手の許可」と「自分の恩恵」の2条件が揃う場合のみ使う\n\n### 尊敬語と謙譲語の混同\n\n**最も多いミス：自分の動作に尊敬語を使ってしまう**\n\n| ✕ 混同 | ○ 正しい | 理由 |\n|---|---|---|\n| 「私がおっしゃったように」 | 「私が申し上げたように」 | 「おっしゃる」はお客様の動作 |\n| 「私がご覧になった」 | 「私が拝見した」 | 「ご覧になる」はお客様の動作 |\n| 「お客様が参られました」 | 「お客様がいらっしゃいました」 | 「参る」は自分の動作 |\n| 「お客様が申しておりました」 | 「お客様がおっしゃっていました」 | 「申す」は自分の動作 |\n\n### 要注意：「よろしかったでしょうか」問題\n\n- ✕ 「こちらでよろしかったでしょうか」\n- ○ 「こちらでよろしいでしょうか」\n→ 現在のことに過去形を使うのは不自然。ただし、**以前の確認事項を再確認する場合**は「よろしかったでしょうか」も許容\n\n### 美容サロン特有の敬語トラブル\n\n**① 施術の説明で専門用語 + タメ口が混ざる**\n- ✕ 「フラットラッシュっていうのがあって、これがすごい軽いの」\n- ○ 「フラットラッシュというメニューがございます。従来のものより軽い付け心地が特徴でございます」\n\n**② お客様の容姿に関する言葉遣い**\n- ✕ 「まつ毛少ないですね」「目が小さめなので」\n- ○ 「まつ毛が繊細でいらっしゃいますね」「お目元の形を活かして」\n→ ネガティブワードは絶対禁止。ポジティブに言い換える\n\n**③ 施術中の独り言**\n- ✕ 「あ、取れちゃった」「んー、難しいな」\n→ お客様は20〜30cmの距離で聞いている。不安を与える独り言は厳禁\n\n### 敬語セルフチェックリスト（毎週確認）\n\n以下の項目を毎週振り返り、○/✕をつけてみましょう。\n\n- 「了解しました」ではなく「承知いたしました」を使っているか\n- 「なるほど」「なるほどですね」と言っていないか\n- 語尾が伸びたり上がったりしていないか\n- 「〜になります」ではなく「〜でございます」を使っているか\n- 「大丈夫ですか」を場面ごとに使い分けているか\n- お客様のことを第三者に話す時「〇〇様がおっしゃっていました」を使えているか\n- 「させていただく」を不要な場面で使っていないか\n- Larkで「り」「おけ」「了解」を使っていないか\n- スタッフ間でもお客様の前では丁寧語を維持しているか\n- 施術中の独り言を出していないか\n\n### 上達の3ステップ\n\n**Step 1（1ヶ月目）：** 「NGワードを使わない」— まず間違いを減らす\n**Step 2（2〜3ヶ月目）：** 「場面別フレーズを反射的に使える」— 型を体に入れる\n**Step 3（4ヶ月目〜）：** 「自然体で丁寧」— 敬語が「素」になる\n\n### 学びのポイント\n- 二重敬語は「丁寧」ではなく「不自然」\n- 「させていただく」は2条件（許可 + 恩恵）で判断\n- 自分の言葉遣いは録音・ロールプレイで客観視する\n- 毎週のセルフチェックで継続的に改善`}],quiz:[{q:"「了解しました」の正しい言い換えは？",opts:["わかりました","承知いたしました","OKです","了承です"],ans:1,explanation:"「承知いたしました」が正しい敬語です。"},{q:"できないことを伝える正しい方法は？",opts:["「できません」","「無理です」","「あいにく難しいのですが、〜という方法もございます」","別スタッフに任せる"],ans:2,explanation:"クッション言葉＋代替案の提示が基本です。"},{q:"電話の保留は原則何秒以内？",opts:["10秒","30秒","1分","2分"],ans:1,explanation:"30秒以内。超える場合は折り返し。"},{q:"「なるほどですね」の正しい言い換えは？",opts:["そうですね","おっしゃる通りです","了解です","はいはい"],ans:1,explanation:"「おっしゃる通りです」が適切です。"},{q:"「おっしゃられました」が不適切な理由は？",opts:["意味が通じないから","カジュアルすぎるから","二重敬語だから","謙譲語だから"],ans:2,explanation:"「おっしゃる」+「られる」で二重敬語になっています。正しくは「おっしゃいました」。"},{q:"「させていただく」を使う正しい条件は？",opts:["いつでも丁寧に言いたい時","相手の許可と自分の恩恵がある時","目上の人に対してのみ","書き言葉でのみ"],ans:1,explanation:"「相手の許可」と「自分が恩恵を受ける」の2条件が揃う場合に使います。"},{q:"施術中にお客様の容姿について「まつ毛が少ないですね」と言う代わりに？",opts:["「まつ毛が短いです」","「まつ毛が繊細でいらっしゃいますね」","「まつ毛が足りないので」","言及しない"],ans:1,explanation:"ネガティブワードはポジティブに言い換えます。「繊細」は美容業界での定番表現です。"},{q:"Larkで「りょ」「おけ」と返信するのがNGな理由は？",opts:["文字数が少ないから","管理者に見られるから","文字が残る公式ツールだから","意味が通じないから"],ans:2,explanation:"Larkは業務ツールであり、文字として記録が残ります。「承知いたしました」が適切です。"},{q:"スタッフ間でお客様の前では必ず丁寧語を使うべき理由は？",opts:["ルールだから","お客様に聞こえており、サロンの印象に直結するから","管理者が見ているから","先輩への敬意"],ans:1,explanation:"スタッフ同士の会話はお客様の耳に届いており、サロン全体の信頼感に影響します。"},{q:"「お客様が参られました」の正しい表現は？",opts:["「お客様が来ました」","「お客様がいらっしゃいました」","「お客様が参りました」","「お客様が来られました」"],ans:1,explanation:"「参る」は謙譲語で自分の動作に使います。お客様には尊敬語「いらっしゃる」を使います。"}],writtenExercises:[{q:"以下のNGフレーズをそれぞれ正しい敬語に書き換えてください。\n\n①「すみません、ちょっとわかんないんで、一応確認してきます」\n②「前回と同じ感じでいいですか？多分大丈夫だと思うんですけど」\n③「今日めっちゃ混んでて、待ち時間ヤバいかもです」\n④「このメニューは無理なんで、違うのにしてください」",hint:"クッション言葉を活用し、各文の問題点を分析してから書き換えてください。"},{q:"新規のお客様を電話で予約受付する場面を想定し、電話を取ってから切るまでの台本をロールプレイ形式で書いてください。保留が必要な場面も入れてください。",hint:"名乗り→要件確認→予約確認→復唱→お礼の基本フローを意識しましょう。"},{q:"以下の5つの場面での「お客様への声かけフレーズ」を、それぞれ敬語で書いてください。\n\n①来店されたお客様を席に案内する\n②施術中にお客様の体勢を変えてもらいたい\n③仕上がりを確認してもらう\n④次回の来店を提案する\n⑤お見送りする",hint:"場面別フレーズ集を参考に、自分の言葉で自然な表現を目指してください。"},{q:"先輩スタッフに「この後のお客様のカルテ準備を手伝ってほしい」とお願いする場面を想定し、以下の3パターンで依頼文を書いてください。\n\n①対面で直接お願いする場合\n②Larkでメッセージを送る場合\n③先輩が施術中で、急ぎの場合",hint:"対面・Lark・緊急時でそれぞれ適切な手段と言葉遣いが異なります。"},{q:"自分が過去1週間で使ってしまった（または使いそうになった）NGフレーズを3つ挙げ、それぞれ①なぜNGか、②正しい表現、③今後どう意識するかを書いてください。もし思いつかない場合は、日常生活で使いがちなカジュアル表現を3つ選んでください。",hint:"自己認識が改善の第一歩です。正直に振り返ることが大切です。"}]}]},{id:"day2",title:"対お客様マナー 実践編",subtitle:"来店〜退店フロー・カウンセリング・クレーム対応",description:"来店から退店まで、実際のサロンワークで求められる接客スキルを体系的に学びます。",modules:[{id:"m4",title:"来店〜退店の接客フロー",lessons:[{id:"m4l1",title:"お出迎え〜着席まで",content:`## 第一印象を決める最初の2分\n\n### お出迎えの完全フロー\n\n**Step 1:** 来店の気配を感じたら、手元の作業を止め、立ち上がって笑顔で「いらっしゃいませ」\n\n**Step 2:** 「ご予約の〇〇様でいらっしゃいますか？」\n\n**Step 3:** 「お荷物とお上着をお預かりいたします」— 大切に扱う\n\n**Step 4:** 「お席にご案内いたします。こちらへどうぞ」\n\n**Step 5:** 「温度は大丈夫ですか？お飲み物はいかがですか？」\n\n**待たせる場合：** 待ち時間の目安を必ず伝える\n\n### 学びのポイント\n- 立ち上がって出迎える\n- お名前を間違えない\n- 待ち時間は目安を伝えてストレス軽減`},{id:"m4l2",title:"カウンセリング〜施術中",content:`## お客様の要望を正確に引き出す\n\n### カウンセリングの5ステップ\n\n**①** 前回の確認（リピーター） — 前回の本数・カール・長さ・持ちの状況\n**②** 今回の希望を聞く — 「自然に」「華やかに」など抽象的な言葉の裏を読む\n**③** 提案する（複数選択肢） — デザインサンプルや施術例の写真を活用\n**④** 料金の事前説明（必ず施術前に） — 本数による料金差も明確に\n**⑤** 同意の確認 — アレルギーテスト歴・コンタクトレンズの有無も確認\n\n### アイラッシュ特有のヒアリングポイント\n\n**必ず確認する項目：**\n- 目元のアレルギー歴（グルー・テープ等）\n- コンタクトレンズの使用（施術中は外していただく場合あり）\n- 直近の目元の施術・治療歴\n- まつ毛パーマとの併用希望\n- 普段のメイクの傾向（マスカラ使用の有無等）\n- 生活スタイル（よく目をこする癖、うつ伏せ寝等）\n\n**デザイン提案のコツ：**\n- 目の形（一重・二重・奥二重）に合ったデザインを提案\n- 「なりたいイメージ」を写真で共有（言葉だけでは齟齬が生まれやすい）\n- 初回のお客様には控えめな本数から提案し、次回以降で調整\n\n### 聞く7割・話す3割\n\n### 施術中の会話調整\n\n目を閉じた → 静かにする / 短い返事 → 会話を減らす / 質問してくる → 話したいサイン\n\n**NGトピック：** 政治・宗教 / 他のお客様の情報 / 他店の悪口 / プライベートの愚痴\n\n### 施術中の5ルール\n1. スマホを触らない\n2. 飲食しない\n3. 私語禁止（隣のベッドのお客様にも配慮）\n4. 姿勢を崩さない\n5. 時間を意識する\n\n### アイラッシュ施術中の衛生管理\n\n**必須事項：**\n- 施術前の手指消毒（お客様の目の前で行うと安心感UP）\n- ツイーザー等の器具は施術ごとに消毒・滅菌\n- グルーは使用期限を厳守（開封後の管理も徹底）\n- テープ・パッドのアレルギー反応に常に注意\n- 施術台・枕カバーは毎回交換\n- 換気を意識（グルーの揮発成分への配慮）\n\n**お客様が目を閉じている間の注意：**\n- 不安を感じさせないよう、次の工程を声で伝える\n- 「右目から始めますね」「半分ほど進みました」等の声かけ\n- 長い沈黙が続く場合「お加減いかがですか？」と確認\n- お客様が眠っている場合は無理に起こさず、仕上げ時に優しく声をかける\n\n### 学びのポイント\n- 料金は必ず施術前に説明\n- 会話量はお客様のサインを読んで調整\n- 5つのルールを守り抜く`},{id:"m4l3",title:"仕上げ確認〜お見送り",content:`## 最後の印象が「また来たい」を決める\n\n### ピークエンドの法則\n\n人は**「一番感情が動いた瞬間」と「最後の瞬間」**で体験を評価します。**お見送りの質 = サロン全体の評価**。\n\n### 仕上げ〜退店フロー\n\n**仕上げ確認：** 正面・横・斜めから / 「気になる点はございますか？」\n**アフターケア説明：**\n- 「施術後5〜6時間は水に濡らさないでください」\n- 「オイルクレンジングは避け、ジェルやミルクタイプをお使いください」\n- 「目をこする癖がある方は意識して控えてください」\n- 「うつ伏せ寝はエクステが崩れやすくなります」\n- 「気になる点があれば〇日以内にご連絡ください」\n**次回提案：** 「〇日以内でリピート価格のご案内ができます」→ 断られたら粘らない\n**お見送り：** 出口まで付き添い → 姿が見えなくなるまで見送る\n\n### 「覚えている」の威力\n\n前回の会話を覚えていること = 最大のリピート要因\n→ **カルテに会話メモを残す習慣を**\n\n### 学びのポイント\n- ピークエンドの法則：最後が全体評価に直結\n- 次回予約は一度断られたら引く\n- 「覚えている」をカルテで仕組み化`}],quiz:[{q:"カウンセリングの「聞く」と「話す」の理想比率は？",opts:["5:5","7:3（聞く:話す）","3:7","9:1"],ans:1,explanation:"聞く7割、話す3割が理想です。"},{q:"料金説明はいつ？",opts:["施術後","施術中","施術前","次回来店時"],ans:2,explanation:"必ず施術前に。"},{q:"ピークエンドの法則が示すことは？",opts:["最初が全て","途中が最重要","ピーク時と最後で評価","価格が満足度を決める"],ans:2,explanation:"ピークとエンドで全体を評価します。"},{q:"お見送りでNGなのは？",opts:["次回予約提案","お客様が見えるのに次の準備開始","コートを渡す","出口まで付添い"],ans:1,explanation:"姿が見えるうちに次の作業はNG。"}],writtenExercises:[{q:"初来店のお客様（30代女性、まつ毛エクステ希望、「自然な感じがいい」）へのカウンセリングを会話形式で書いてください。料金説明・アレルギー確認・同意確認まで含めて。",hint:"オープン→クローズドの質問の流れ、「自然」の深掘りがポイントです。"},{q:"施術後のお見送り時、お客様が「うーん…思っていたのとちょっと違うかも…」とつぶやきました。この瞬間からの対応を、セリフ・行動・管理者への報告まで時系列で書いてください。",hint:"クレーム初動の3ステップと、自己判断で約束しないルールを思い出してください。"}]},{id:"m5",title:"提案スキルとリピート戦略",lessons:[{id:"m5l1",title:"ニーズの深掘りと提案",content:`## 言葉にできない要望を読み取る\n\n### 表面ニーズ vs 深層ニーズ\n\n| お客様の言葉 | 本当のニーズ |\n|---|---|\n| 「自然な感じで」 | やりすぎに見られたくない |\n| 「前と同じで」 | 失敗したくない |\n| 「おまかせで」 | よくわからないから導いてほしい |\n| 「持ちがいいの」 | 来店頻度を抑えたい / 予算重視 |\n| 「目が大きく見えるように」 | コンプレックスを解消したい |\n| 「職場でバレないように」 | 清潔感UP・ナチュラル志向 |\n| 「前のサロンでは…」 | 前回の不満を繰り返したくない |\n\n### 提案の3原則\n1. お客様の希望に沿った提案\n2. 複数の選択肢を提示（最低2つ）\n3. 決定はお客様に委ねる（「いかがですか？」）\n\n### リピートにつなげるクロージング\n\n**仕上がりへの共感 →** 「とてもお似合いですね！」\n**ケア説明 →** 「長持ちのコツは〇〇です」\n**次回提案 →** 「〇週間後がベストタイミングです」\n**断られたら →** 「かしこまりました。いつでもご連絡ください」\n\n### 「覚えている」リスト\n- 名前 / 前回の施術内容 / 前回の会話\n- 季節に合わせた一言 / お客様の変化に気づく\n→ **カルテのメモで仕組み化**\n\n### 学びのポイント\n- 言葉の裏の深層ニーズを読む\n- 料金は施術前・明確に\n- 「覚えている」が最大のリピート要因`}],quiz:[{q:"「おまかせで」の深層ニーズは？",opts:["何でもいい","安い方がいい","導いてほしい","急いでいる"],ans:2,explanation:"「わからないから導いてほしい」という気持ちです。"},{q:"提案の選択肢は最低いくつ？",opts:["1つ","2つ","4つ","5つ"],ans:1,explanation:"最低2つ。1つだけは押し売り感が出ます。"},{q:"リピーターに最も効果的なのは？",opts:["値引き","前回の会話を覚えていること","新メニュー紹介","施術時間延長"],ans:1,explanation:"「覚えていてくれた」が最大の信頼要因です。"}],writtenExercises:[{q:"HOLOGRAMの価格表を参考に、以下のお客様に3つのメニュー提案をしてください。\n\n【お客様】リピーター / 前回セーブル120本 / 「まつ毛が薄くなってきた」「ボリュームが欲しい」「予算1万円以内」/ 前回来店から25日",hint:"周期ルール（30日以内の特別価格）とお客様の悩み（ボリュームラッシュ提案可能性）を考慮。"}]},{id:"m6",title:"クレーム・トラブル対応",lessons:[{id:"m6l1",title:"クレーム初動の3ステップ",content:`## 最初の30秒が全てを決める\n\n### Step 1: 受け止める\n「ご不快な思いをさせてしまい、大変申し訳ございません」\n→ まず謝罪。言い訳・反論は絶対にしない\n\n### Step 2: 確認する\n「詳しくお聞かせいただけますか？」\n→ 話を遮らない。メモを取る\n\n### Step 3: エスカレーション\n「確認いたしますので、少々お待ちいただけますか」\n→ Larkで管理者（酒井 or Kunita）に即連絡\n\n### 絶対禁止\n1. 自己判断で値引き・やり直しを約束\n2. 「でも」で反論\n3. 他スタッフのせいにする\n4. 「そういうものです」と正当化\n\n### パターン別対応\n\n**仕上がり不満：** 「どの点が気になりますか？担当者と最善の対応を検討します」\n**施術トラブル：** 「状態を確認させてください。保証期間内ならお直しをご案内します」\n**口コミの脅し：** 「貴重なご意見として承ります」→ 管理者にエスカレーション\n\n### アイラッシュ施術特有のトラブル対応\n\n**目の充血・かゆみの訴え：**\n1. 直ちに施術を中断し、状態を確認\n2. 「すぐに確認させてください」と冷静に対応\n3. 管理者に即報告\n4. 必要に応じて眼科の受診をご案内\n\n**グルーアレルギーの疑い：**\n- 施術後24〜48時間以内の腫れ・かゆみは要注意\n- 「すぐに当サロンにご連絡ください」と事前にお伝えする\n- 自己判断で対処法を指示しない（医療行為になる可能性）\n\n**「思っていたデザインと違う」：**\n- カウンセリング時の記録を確認\n- 「どの部分が気になりますか？」と具体的にヒアリング\n- 保証期間内のお直し対応について説明\n- 次回への改善点をカルテに必ず記録\n\n### サービスリカバリーパラドックス\n\nクレームを適切に対応した場合、**問題がなかった場合より満足度が上がる**ことがある。\n\n### 学びのポイント\n- 新人は「傾聴とエスカレーション」が役割\n- 値引き約束は絶対禁止\n- クレームは対応次第でファンを生む機会`}],quiz:[{q:"クレーム対応の最初のステップは？",opts:["原因説明","謝罪と共感","解決策提案","管理者を呼ぶ"],ans:1,explanation:"まず「謝罪と共感」から。"},{q:"新人のクレーム対応で最重要な役割は？",opts:["自分で解決","傾聴とエスカレーション","値引き提案","スタッフ交代"],ans:1,explanation:"新人は傾聴とエスカレーションが役割です。"},{q:"「悪い口コミ書く」と言われた場合は？",opts:["特別値引き","全て受入れ","管理者にエスカレーション","突き放す"],ans:2,explanation:"必ず管理者にエスカレーション。"}],writtenExercises:[{q:"施術から5日後にお客様から電話：「エクステが半分取れた。5日しか経ってないのにおかしくない？お金返して」。あなたは電話を取った新人です。対応を最初の一言からLark報告まで時系列で書いてください。",hint:"電話応対の敬語、クレーム初動3ステップ、自分の権限範囲を全て活用してください。"},{q:"「サービスリカバリーパラドックス」がなぜ起きるのか、人間の心理面から200字以上で分析してください。",hint:"「期待を裏切られた後に期待を超える対応をされた」体験の構造を考えてみてください。"}]}]},{id:"day3",title:"対スタッフ・対上司 & 総合演習",subtitle:"チームワーク・報連相・総合シナリオ",description:"同僚・管理者との関係構築マナーと、全3日間の学びを統合する演習に取り組みます。",modules:[{id:"m7",title:"対スタッフ（同僚）マナー",lessons:[{id:"m7l1",title:"日常コミュニケーションと業務連携",content:`## チームワークの土台\n\n### 挨拶は全ての基本\n\n**出勤：** 「おはようございます」（全員に聞こえるように）\n**退勤：** 「お先に失礼します。お疲れ様でした」\n\n### 声をかけるタイミング\n**OK：** 施術後 / お手洗い中 / スタッフルーム\n**NG：** 施術中 / カウンセリング中\n**緊急時：** メモ / Larkメッセージ\n\n### お客様の前での禁止事項\n- スタッフ同士の注意・指摘\n- プライベートの話\n- 内輪ネタ\n\n### 業務連携ルール\n- 共有物は元に戻す\n- 消耗品の残量は自分から報告\n- 予約の押しは後続スタッフに即報告\n- 引き継ぎはカルテに記録\n- SalonBoardの予約設定は管理者の承諾なく変更禁止\n\n### 学びのポイント\n- 不満は陰口でなく管理者へ\n- 引き継ぎは口頭でなくカルテに記録`},{id:"m7l2",title:"業務委託スタッフとしての距離感",content:`## 同僚でありながら独立した事業者\n\n### HOLOGRAMの契約構造\n\n| 項目 | 一般的な雇用 | HOLOGRAMの働き方 |\n|---|---|---|\n| 関係 | 組織の一員 | 相互尊重のパートナー |\n| 報酬 | 固定給 | 売上連動（詳細は個別契約を確認） |\n| 税金 | 源泉徴収 | 契約形態による（詳細は個別確認） |\n\n### 適切な距離感\n**配慮が必要な話題：** 個人の報酬・売上に関する話題はデリケートなため、お互いへの配慮を忘れずに\n**尊重：** 技術スタイル / 接客スタイル / 働く日数\n\n### シフト変更は管理者を通す\n\n### 信頼を守るためのルール\n- お客様情報の適切な管理（個人情報保護法の遵守）\n- サロンの予約システムを通じた適切な対応\n- 顧客情報の取り扱いは契約内容に準拠\n→ 詳細は個別の契約書をご確認ください\n\n### 学びのポイント\n- 業務委託 = 独立した事業者\n- 報酬・売上の話題に触れない\n- シフト変更は管理者を通す`}],quiz:[{q:"施術中スタッフに急ぎの連絡をする方法は？",opts:["大声で呼ぶ","メモ/Lark","直接話す","後で伝える"],ans:1,explanation:"メモやLarkで対応します。"},{q:"シフト交代の正しい方法は？",opts:["直接頼む","LINE","管理者を通す","勝手に交代"],ans:2,explanation:"管理者を通します。"},{q:"触れてはいけない話題は？",opts:["天気","報酬額・売上","趣味","施術テクニック"],ans:1,explanation:"報酬・売上は個人情報です。"}],writtenExercises:[{q:"先輩スタッフAさんが休憩室でBさんの悪口を言い「Bさんって接客雑だよね？」と同意を求めてきました。①その場の返答、②その後の行動（報告要否含む）、③こうした状況を防ぐために日頃から意識すべきことを書いてください。",hint:"陰口に同調しないことと、Aさんとの関係を壊さない両立を考えてください。"},{q:"シフト変更を同僚に直接お願いするのではなく管理者を通す必要がある理由を、法的観点と実務的観点の両方から説明してください。",hint:"偽装請負・みなし雇用リスクと口約束トラブル防止の観点から考えてみてください。"}]},{id:"m8",title:"対上司（管理者）マナー",lessons:[{id:"m8l1",title:"報連相の型",content:`## 管理者が求めるコミュニケーション\n\n### 管理者が最も困ること = 情報が来ないこと\n\n### 報告・連絡・相談\n**報告：** 結果を伝える（完了後すぐ）\n**連絡：** 事実を共有（気づいた時すぐ）\n**相談：** 判断を仰ぐ（権限を超える時）\n\n### Lark報告テンプレート\n「お疲れ様です。〇〇の件、ご報告です。\n【結論】△△となりました。\n【経緯】□□のため、◇◇しました。\n【備考】◇◇の対応が必要です」\n\n### 相談テンプレート\n「【状況】△△が発生\n【選択肢A】□□→メリット/デメリット\n【選択肢B】□□→メリット/デメリット\n【私の考え】Aが良いと思います」\n\n### NGな報連相\n- 丸投げ / 長文で結論不明 / 口頭のみ / 事後報告\n\n### 学びのポイント\n- 報告は結論から、相談は選択肢つき\n- Larkで記録を残す`},{id:"m8l2",title:"指示・フィードバック・ミス報告",content:`## 素直さ × 主体性\n\n### 指示の受け方 4ステップ\n1. 最後まで聞く\n2. 復唱確認\n3. 不明点をその場で確認\n4. 期限と優先度の確認\n\n### 納得いかない場合\nまず従う → 後から「△△という方法もあるのでは」と提案\n\n### フィードバックの受け方\n- 言い訳から入らない\n- 改善行動を具体的に伝え返す\n- 「気をつけます」で終わらせない → 「次回から〇〇します」\n\n### ミス報告\n\n**ミスの大きさより報告の遅さが問題**\n\n**第一報テンプレート：**\n「【緊急】〇〇の件\n【何が起きたか】△△発生\n【現在の状況】□□\n【お客様への影響】◇◇\n【取り急ぎの対応】◇◇しています」\n\n**事実と推測を分ける**\n**報告後：** 再発防止策を自分から提案\n\n### 学びのポイント\n- フィードバック = 成長への期待\n- 隠すのが最大のNG\n- 再発防止策を自分から出す`}],quiz:[{q:"相談の正しい方法は？",opts:["丸投げ","選択肢つき","自分で決める","同僚に聞く"],ans:1,explanation:"選択肢つきで判断を仰ぎます。"},{q:"フィードバックの最初の一言は？",opts:["でも…","承知しました。ありがとうございます","他の人もやってます","気をつけます"],ans:1,explanation:"まず受け止めることが重要です。"},{q:"ミス時に最もNGなのは？",opts:["すぐ報告","隠す","メモ","再発防止策"],ans:1,explanation:"隠すのが最大のNGです。"},{q:"事実と推測を分ける理由は？",opts:["長くなるから","誤った判断を防ぐため","管理者が嫌がる","理由なし"],ans:1,explanation:"推測を事実として報告すると誤った対応につながります。"}],writtenExercises:[{q:"施術中にお客様のまぶたに軽い赤みが出た。「少しヒリヒリする」と言うが、中止したら赤みは引いてきている。お客様は「続けてほしい」と言う。管理者は本日不在。Lark報告文をテンプレートに沿って書いてください。",hint:"緊急報告フォーマット、事実と推測の分離、自分の権限範囲を意識。"},{q:"管理者から「お見送りが雑になっている」と指摘を受けました。①その場の返答、②具体的改善計画、③1週間後の改善報告文を書いてください。",hint:"「気をつけます」で終わらせない具体策を考えてください。"}]},{id:"m9",title:"総合シナリオ演習",lessons:[{id:"m9l1",title:"シナリオ演習",content:`## 3日間の学びを統合する\n\n### 全体像\n\n**STEP 1：** プロの3つの柱 / 時間管理 / 当事者意識 / 第一印象 / 敬語\n**STEP 2：** 来店〜退店 / カウンセリング / 提案・リピート / クレーム対応\n**STEP 3：** 同僚マナー / 業務委託の距離感 / 報連相 / ミス報告\n\nすべてを総動員して演習に挑んでください。`}],quiz:[{q:"【シナリオ】前のスタッフの施術台が汚れたまま。あと10分で来客。正しい対応は？",opts:["前スタッフに文句","お客様の前で愚痴","自分で清掃→後でLark報告","汚れたまま施術"],ans:2,explanation:"当事者意識を持ち対応。不満は後で正規ルートで。"},{q:"【シナリオ】「前回の仕上がり気に入らなかった」と別担当のことを言われた。正しい対応は？",opts:["「前の担当のせい」","「私にはわかりません」","前向きに受け止め後で管理者に共有","「直接言って」"],ans:2,explanation:"他スタッフ批判に同調せず、前向きに。"},{q:"【シナリオ】先輩が「予約設定、自分で変えていいよ」と。正しい対応は？",opts:["先輩に従う","自分で変更","「管理者承諾が必要なので確認します」","無視"],ans:2,explanation:"契約上、管理者の事前承諾が必要。"},{q:"【シナリオ】「名刺ちょうだい。友達に紹介したい」。名刺はない。正しい対応は？",opts:["個人連絡先","「ありません」のみ","公式予約ルートを案内","個人SNSを渡す"],ans:2,explanation:"個人連絡先は顧客誘導リスク。公式ルートを案内。"},{q:"【シナリオ】管理者から厳しいフィードバック。カチンときた。正しい対応は？",opts:["その場で反論","受け止め→後で改善策を伝える","黙って態度を変える","同僚に愚痴"],ans:1,explanation:"まず受け止め、冷静に改善策を。"},{q:"【シナリオ】ミスでグルーが肌に少量付着。客は気づいていない。正しい対応は？",opts:["そのまま続行","正直に伝え対処→管理者報告","こっそり拭く","パニック停止"],ans:1,explanation:"隠すのが最大のNG。"},{q:"【シナリオ】退勤前、明日初来店の客カルテにアレルギー記載。明日の担当は別。正しい対応は？",opts:["担当にLINE","管理者にLark報告","明日伝える","カルテにあるから大丈夫"],ans:1,explanation:"安全に関わる情報は即管理者を通して共有。"},{q:"【シナリオ】閉店間際「アート追加したい」対応すると30分超過。正しい対応は？",opts:["「無理」と断る","自己判断でOK","代替案「次回しっかりお時間取れます」","黙って対応"],ans:2,explanation:"代替案とセットで伝える。"}],writtenExercises:[{q:"以下の複合シナリオへの対応を時系列で書いてください。\n\n施術中に①別スタッフの客が「具合が悪い」と声かけてきた（スタッフは施術中で手が離せない）②自分の客から「前回カールが左右違った。今回は揃えて」と言われた ③管理者からLarkで「シフトについて至急確認したい」とメッセージ。\n\nそれぞれの対応と優先順位、セリフ、業務後の報告を書いてください。",hint:"優先順位（安全>お客様>業務連絡）を意識。"},{q:"3日間の研修で最も印象に残った学びを3つ挙げ、「なぜ印象に残ったか」「明日からどう活かすか」「1ヶ月後にどうなっていたいか」を600字以上で書いてください。",hint:"抽象的な感想ではなく具体的な行動レベルで。"}]}]}]};

// ── PROGRESS HELPERS ──
const allLessons = [];
const allModuleIds = [];
TRAINING_DATA.days.forEach(d => d.modules.forEach(m => { allModuleIds.push(m.id); m.lessons.forEach(l => allLessons.push(l.id)); }));

// ── COMPONENTS ──
const ProgressBar = ({ current, total, label, variant = "default" }) => {
  const pct = total > 0 ? Math.round((current / total) * 100) : 0;
  const bg = variant === "gold" ? "rgba(201,145,138,0.2)" : "rgba(91,14,45,0.08)";
  const fill = variant === "gold" ? "linear-gradient(90deg, #C9918A, #A06B62)" : "linear-gradient(90deg, #C9918A, #5B0E2D)";
  return (
    <div className="w-full">
      {label && <div className="flex justify-between mb-1.5" style={{ fontSize: 11, letterSpacing: "0.05em", color: "#5B0E2D" }}><span style={{ fontWeight: 500 }}>{label}</span><span style={{ fontWeight: 600 }}>{pct}%</span></div>}
      <div className="w-full rounded-full overflow-hidden" style={{ height: 5, backgroundColor: bg }}>
        <div className="h-full rounded-full transition-all duration-700" style={{ width: `${pct}%`, background: fill }} />
      </div>
    </div>
  );
};

const MarkdownLite = ({ text }) => {
  const lines = text.split("\n");
  const elements = [];
  let inTable = false, tableRows = [];
  const renderInline = (s) => { const parts = []; const re = /\*\*(.+?)\*\*/g; let last = 0, m; while ((m = re.exec(s)) !== null) { if (m.index > last) parts.push(<span key={last}>{s.slice(last, m.index)}</span>); parts.push(<strong key={m.index} style={{ color: "#5B0E2D", fontWeight: 600 }}>{m[1]}</strong>); last = re.lastIndex; } if (last < s.length) parts.push(<span key={last}>{s.slice(last)}</span>); return parts.length ? parts : s; };
  const splitRow = (r) => { const cells = r.split("|"); if (cells[0].trim() === "") cells.shift(); if (cells.length && cells[cells.length-1].trim() === "") cells.pop(); return cells; };
  const flushTable = () => { if (tableRows.length < 2) return null; const h = splitRow(tableRows[0]); const b = tableRows.slice(2).map(r => splitRow(r)); const t = (<div key={`t${elements.length}`} className="overflow-x-auto my-4"><table className="w-full text-sm" style={{ borderCollapse: "collapse" }}><thead><tr>{h.map((c, i) => <th key={i} className="text-left p-2.5" style={{ borderBottom: "2px solid #C9918A", color: "#5B0E2D", fontWeight: 600, fontSize: 12, letterSpacing: "0.04em" }}>{renderInline(c.trim())}</th>)}</tr></thead><tbody>{b.map((row, ri) => <tr key={ri} style={{ borderBottom: "1px solid rgba(201,145,138,0.15)" }}>{row.map((cell, ci) => <td key={ci} className="p-2.5" style={{ fontSize: 13 }}>{renderInline(cell.trim())}</td>)}</tr>)}</tbody></table></div>); tableRows = []; inTable = false; return t; };
  for (let i = 0; i < lines.length; i++) { const l = lines[i]; if (l.includes("|") && (l.trim().startsWith("|") || l.includes("---|"))) { if (!inTable) inTable = true; tableRows.push(l); if (i === lines.length - 1 || !(lines[i+1] && lines[i+1].includes("|"))) { const t = flushTable(); if (t) elements.push(t); } continue; } if (inTable) { const t = flushTable(); if (t) elements.push(t); }
    if (l.startsWith("## ")) elements.push(<h2 key={i} className="mt-8 mb-3" style={{ fontSize: 20, fontWeight: 700, color: "#5B0E2D", fontFamily: "'Cormorant Garamond', serif", letterSpacing: "0.02em" }}>{l.slice(3)}</h2>);
    else if (l.startsWith("### ")) elements.push(<h3 key={i} className="mt-5 mb-2" style={{ fontSize: 15, fontWeight: 600, color: "#7C3F58" }}>{renderInline(l.slice(4))}</h3>);
    else if (l.startsWith("- ✕") || l.startsWith("✕")) elements.push(<div key={i} className="flex items-start gap-2.5 ml-2 my-1.5"><span style={{ color: "#B91C1C", fontWeight: 600, fontSize: 12, marginTop: 2 }}>✕</span><span style={{ fontSize: 13, lineHeight: 1.7 }}>{renderInline(l.replace(/^[-✕✗]\s*/, ""))}</span></div>);
    else if (l.startsWith("- ○") || l.startsWith("○")) elements.push(<div key={i} className="flex items-start gap-2.5 ml-2 my-1.5"><span style={{ color: "#047857", fontWeight: 600, fontSize: 12, marginTop: 2 }}>○</span><span style={{ fontSize: 13, lineHeight: 1.7 }}>{renderInline(l.replace(/^[-○]\s*/, ""))}</span></div>);
    else if (l.startsWith("- ")) elements.push(<div key={i} className="flex items-start gap-2.5 ml-2 my-1.5"><span style={{ color: "#C9918A", fontSize: 8, marginTop: 6 }}>●</span><span style={{ fontSize: 13, lineHeight: 1.7 }}>{renderInline(l.slice(2))}</span></div>);
    else if (l.startsWith("→")) elements.push(<div key={i} className="ml-6 my-1" style={{ fontSize: 12, fontStyle: "italic", color: "#7C3F58" }}>{renderInline(l)}</div>);
    else if (l.trim() === "") elements.push(<div key={i} style={{ height: 6 }} />);
    else elements.push(<p key={i} style={{ fontSize: 13.5, lineHeight: 1.85, color: "#2D2D2D", margin: "3px 0" }}>{renderInline(l)}</p>);
  }
  if (inTable) { const t = flushTable(); if (t) elements.push(t); }
  return <div>{elements}</div>;
};

  const [registerName, setRegisterName] = useState("");
  const [registering, setRegistering] = useState(false);
  const [initialLoading, setInitialLoading] = useState(() => !!getUrlParam("id"));
  const [copyMsg, setCopyMsg] = useState("");

  // ── 受講者モード: 初回ロードでGASから進捗復元 ──
  useEffect(() => {
    if (mode === "trainee" && traineeId && GAS_URL) {
      setInitialLoading(true);
      sendToGAS({ action: "get_trainee_progress", traineeId }).then(res => {
        if (res && res.status === "ok" && res.state) {
          if (res.state.done) setDone(res.state.done);
          if (res.state.qDone) setQDone(res.state.qDone);
          if (res.state.qAns) setQAns(res.state.qAns);
          if (res.state.qSub) setQSub(res.state.qSub);
          if (res.state.wAns) setWAns(res.state.wAns);
          if (res.name) setTraineeName(res.name);
        }
        setInitialLoading(false);
      }).catch(() => setInitialLoading(false));
    }
    if (mode === "admin" && GAS_URL) {
      loadTraineeList();
      loadDashboard();
    }
  }, []);

  const totalL = allLessons.length;
  const doneC = Object.keys(done).length;
  const totalQ = allModuleIds.length;
  const qDoneC = Object.keys(qDone).length;

  const isModDone = (m) => m.lessons.every(l => done[l.id]);
  const dayProg = (d) => { let c = 0; d.modules.forEach(m => m.lessons.forEach(l => { if (done[l.id]) c++; })); return c; };
  const dayTotal = (d) => { let c = 0; d.modules.forEach(m => c += m.lessons.length); return c; };
  const nav = (v) => { setView(v); if (v.t === "mod") setTab("lessons"); window.scrollTo({ top: 0, behavior: "smooth" }); };
  const nextL = (id) => { const i = allLessons.indexOf(id); return i >= 0 && i < allLessons.length - 1 ? allLessons[i + 1] : null; };
  const findL = (id) => { for (const d of TRAINING_DATA.days) for (const m of d.modules) { const l = m.lessons.find(l => l.id === id); if (l) return { d, m, l }; } return null; };
  const findM = (id) => { for (const d of TRAINING_DATA.days) { const m = d.modules.find(m => m.id === id); if (m) return { d, m }; } return null; };

  const submitQ = (mid, quiz) => {
    const newQSub = { ...qSub, [mid]: true };
    setQSub(newQSub);
    const ok = quiz.filter((q, i) => qAns[`${mid}-${i}`] === q.ans).length;
    const passed = ok >= Math.ceil(quiz.length * 0.7);
    const newQDone = passed ? { ...qDone, [mid]: true } : qDone;
    if (passed) setQDone(newQDone);
    const fm = findM(mid);
    syncProgress([{ type: "quiz_submit", dayId: fm?.d?.id, moduleId: mid, moduleName: fm?.m?.title, quizCorrect: ok, quizTotal: quiz.length, quizPassed: passed }], { qSub: newQSub, qDone: newQDone });
  };
  const retryQ = (mid) => { const na = { ...qAns }; Object.keys(na).forEach(k => { if (k.startsWith(mid)) delete na[k]; }); setQAns(na); setQSub(p => { const n = { ...p }; delete n[mid]; return n; }); setQDone(p => { const n = { ...p }; delete n[mid]; return n; }); };

  // ── GAS連携関数 ──
  const buildProgressData = () => {
    const completedLessons = Object.keys(done).length;
    const completedQuizzes = Object.keys(qDone).length;
    const writtenCount = Object.keys(wAns).filter(k => wAns[k] && wAns[k].trim().length > 0).length;
    const dayProgress = (d) => {
      const total = dayTotal(d);
      const prog = dayProg(d);
      return total ? Math.round(prog / total * 100) + "%" : "0%";
    };
    return {
      completedLessons, totalLessons: totalL,
      completedQuizzes, totalQuizzes: totalQ,
      writtenCount,
      day1: TRAINING_DATA.days[0] ? dayProgress(TRAINING_DATA.days[0]) : "0%",
      day2: TRAINING_DATA.days[1] ? dayProgress(TRAINING_DATA.days[1]) : "0%",
      day3: TRAINING_DATA.days[2] ? dayProgress(TRAINING_DATA.days[2]) : "0%",

  };

  const syncProgress = async (events = [], updatedState = null) => {
    if (!traineeId || !GAS_URL) return;
    setSyncStatus("syncing");
    // updatedState allows passing the latest state when setDone etc. hasn't committed yet
    const currentDone = updatedState?.done ?? done;
    const currentQDone = updatedState?.qDone ?? qDone;
    const currentQAns = updatedState?.qAns ?? qAns;
    const currentQSub = updatedState?.qSub ?? qSub;
    const currentWAns = updatedState?.wAns ?? wAns;
    const payload = {
      action: events.length > 0 ? "log_progress" : "sync_full",
      traineeId,
      traineeName,
      progress: buildProgressData(),
      detailedState: { done: currentDone, qDone: currentQDone, qAns: currentQAns, qSub: currentQSub, wAns: currentWAns },
      events,
    };
    const res = await sendToGAS(payload);
    setSyncStatus(res && !res.error ? "ok" : "error");
    setTimeout(() => setSyncStatus(""), 3000);

      <nav className="sticky top-0 z-40 backdrop-blur-xl" style={{ backgroundColor: "rgba(250,246,241,0.88)", borderBottom: "1px solid rgba(201,145,138,0.1)" }}>
        <div className="max-w-3xl mx-auto px-4 py-3.5 flex items-center justify-between">
          <div className="flex items-center gap-3 cursor-pointer" onClick={() => nav(mode === "admin" ? { t: "dashboard" } : { t: "home" })}>
            <span style={{ fontSize: 18, fontWeight: 600, color: "#5B0E2D", fontFamily: "'Cormorant Garamond', serif", letterSpacing: "0.08em" }}>HOLOGRAM</span>
            <span className="px-1.5 py-0.5 rounded" style={{ fontSize: 8, fontWeight: 700, letterSpacing: "0.15em", backgroundColor: "rgba(201,145,138,0.12)", color: "#C9918A" }}>TRAINING</span>
          </div>
          {mode === "trainee" && (
            <div className="flex items-center gap-3">
              <span style={{ fontSize: 11, fontWeight: 600, color: "#5B0E2D" }}>{doneC}/{totalL}</span>
              <div style={{ width: 64 }}><ProgressBar current={doneC} total={totalL} /></div>
            </div>
          )}
        </div>
      </nav>

      {view.t === "home" && renderHome()}
      {view.t === "mod" && renderMod(view.id)}
      {view.t === "lesson" && renderLesson(view.id)}
      {view.t === "dashboard" && renderDashboard()}

      <footer className="text-center py-12" style={{ fontSize: 11, color: "#bbb", letterSpacing: "0.08em" }}>
        <p>HOLOGRAM / 株式会社Uluu</p>
        <p style={{ marginTop: 4, fontSize: 10 }}>CONFIDENTIAL — INTERNAL USE ONLY</p>
      </footer>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>


</html>
